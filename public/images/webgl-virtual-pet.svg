<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 795 477" role="img" aria-labelledby="title desc">
  <title id="title">WebGL Virtual Pet</title>
  <desc id="desc">A round tan virtual pet standing in a simple 3D room with a blue sky background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cb2c3" />
      <stop offset="45%" stop-color="#79c7d2" />
      <stop offset="100%" stop-color="#4aa1bb" />
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#579a9b" />
      <stop offset="100%" stop-color="#468986" />
    </linearGradient>
    <radialGradient id="body" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#d3b56b" />
      <stop offset="56%" stop-color="#bb9350" />
      <stop offset="100%" stop-color="#8c6836" />
    </radialGradient>
    <radialGradient id="muzzle" cx="42%" cy="32%" r="72%">
      <stop offset="0" stop-color="#eee8dd" />
      <stop offset="70%" stop-color="#cbc4b4" />
      <stop offset="100%" stop-color="#aaa28f" />
    </radialGradient>
    <radialGradient id="nose" cx="40%" cy="32%" r="70%">
      <stop offset="0" stop-color="#e5a8ca" />
      <stop offset="100%" stop-color="#a55a82" />
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="petShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="-8" dy="15" stdDeviation="8" flood-color="#153f43" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="795" height="477" fill="url(#floor)" />
  <rect width="795" height="124" fill="url(#sky)" />
  <path d="M0 12 C80 22 95 6 160 15 C232 25 285 10 356 23 C430 37 507 10 580 18 C646 25 695 7 795 17 L795 0 L0 0 Z" fill="#8bd1df" opacity="0.38" />
  <path d="M0 78 C60 70 95 91 150 78 C215 62 267 84 337 71 C409 58 471 89 548 72 C624 55 688 77 795 62 L795 0 L0 0 Z" fill="#b8e1e5" opacity="0.2" />
  <rect y="123" width="795" height="14" fill="#d9c2a8" />
  <rect y="137" width="795" height="32" fill="#cdbba5" />
  <line x1="0" y1="123" x2="795" y2="123" stroke="#e9e4d7" stroke-width="4" />

  <ellipse cx="310" cy="363" rx="94" ry="47" fill="#164f53" opacity="0.85" filter="url(#softShadow)" />

  <g filter="url(#petShadow)">
    <path d="M323 128 L367 177 L327 202 Z" fill="#b88d43" stroke="#8b672f" stroke-width="3" />
    <path d="M472 128 L430 202 L514 177 Z" fill="#b88d43" stroke="#8b672f" stroke-width="3" />
    <ellipse cx="398" cy="267" rx="117" ry="119" fill="url(#body)" />
    <path d="M343 357 C350 381 374 403 395 380 C377 372 361 363 343 357 Z" fill="#8a5f2e" opacity="0.85" />
    <path d="M452 357 C445 381 421 403 400 380 C418 372 434 363 452 357 Z" fill="#8a5f2e" opacity="0.85" />
    <ellipse cx="399" cy="303" rx="80" ry="59" fill="url(#muzzle)" />
    <circle cx="357" cy="255" r="20" fill="#030814" />
    <circle cx="439" cy="255" r="20" fill="#030814" />
    <circle cx="398" cy="279" r="13" fill="url(#nose)" />
    <path d="M387 301 C390 314 398 315 398 304 C398 315 407 314 410 301" fill="none" stroke="#170d0b" stroke-width="6" stroke-linecap="round" />
    <path d="M392 309 C396 316 403 316 407 309" fill="none" stroke="#170d0b" stroke-width="5" stroke-linecap="round" />
    <path d="M333 142 L352 178 L323 196 Z" fill="#ccaa63" opacity="0.65" />
    <path d="M463 142 L446 178 L493 196 Z" fill="#ccaa63" opacity="0.65" />
  </g>
</svg>
