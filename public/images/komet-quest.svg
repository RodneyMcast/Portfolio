<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 347 260" role="img" aria-labelledby="title desc">
  <title id="title">Komet Quest</title>
  <desc id="desc">Komet Quest logo with a small robot in a neon digital grid environment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07213a" />
      <stop offset="55%" stop-color="#093347" />
      <stop offset="100%" stop-color="#0a151f" />
    </linearGradient>
    <linearGradient id="robot" x1="155" y1="45" x2="290" y2="225" gradientUnits="userSpaceOnUse">
