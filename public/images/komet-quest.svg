      <stop offset="42%" stop-color="#78aeb7" />
      <stop offset="100%" stop-color="#42535d" />
    </linearGradient>
    <linearGradient id="robotSide" x1="230" y1="60" x2="304" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#83dce3" />
      <stop offset="100%" stop-color="#32404a" />
    </linearGradient>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="3" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.55" />
    </filter>
  </defs>
